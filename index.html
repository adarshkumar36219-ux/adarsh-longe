<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adarsh Lodge - Saharsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --blue: #1b263b; --teal: #00a896; --bg: #f0f3f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); padding-bottom: 80px; }

        /* Header & Tabs (Careerwill Style) */
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .tabs { display: flex; background: white; overflow-x: auto; padding: 12px 5px; border-bottom: 1px solid #ddd; }
        .tab { padding: 5px 20px; color: #666; font-weight: bold; white-space: nowrap; font-size: 14px; cursor: pointer; }
        .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }

        /* Hero Banner */
        .hero-banner { background: linear-gradient(135deg, #1b263b, #415a77); margin: 15px; border-radius: 15px; padding: 20px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .banner-btn { background: var(--teal); color: white; border: none; padding: 8px 20px; border-radius: 5px; margin-top: 15px; font-weight: bold; }

        /* Rooms & Mess Cards */
        .container { padding: 0 15px; }
        .card { background: white; border-radius: 15px; margin-bottom: 15px; padding: 15px; position: relative; border-left: 6px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .available-border { border-left-color: #28a745; }
        .booked-border { border-left-color: #e63946; opacity: 0.8; }
        .status-badge { position: absolute; top: 0; left: 15px; font-size: 10px; color: white; padding: 2px 8px; border-radius: 0 0 8px 8px; font-weight: bold; }
        .available-bg { background: #28a745; }
        .booked-bg { background: #e63946; }

        /* Gallery Section */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .gallery-img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; flex: 1; }
        .nav-item.active { color: var(--teal); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <header>
        <div><i class="fas fa-bars"></i> &nbsp; Adarsh Lodge</div>
        <div style="position: relative;"><i class="fas fa-bell"></i><span style="background:red; font-size:9px; padding:1px 4px; border-radius:50%; position:absolute; top:-5px; right:-5px;">9+</span></div>
    </header>

    <div class="tabs">
        <div class="tab active" id="t1" onclick="switchTab('Rooms', 't1')">Rooms</div>
        <div class="tab" id="t2" onclick="switchTab('Mess', 't2')">Mess Menu</div>
        <div class="tab" id="t3" onclick="switchTab('Gallery', 't3')">Photos</div>
        <div class="tab">Location</div>
    </div>

    <div id="hero" class="hero-banner">
        <div style="background:#ffbe0b; color:black; font-size:10px; font-weight:bold; padding:2px 8px; border-radius:4px; display:inline-block;">FOUNDATION 2026</div>
        <h2 style="margin:10px 0;">आदर्श लॉज सहरसा</h2>
        <p>एडमिशन ओपन: रहने + खाने की उत्तम व्यवस्था</p>
        <button class="banner-btn" onclick="window.location.href='tel:919876543210'">अभी कॉल करें</button>
    </div>

    <div class="container" id="main-content">
        <p style="text-align:center; padding:50px;">लोड हो रहा है...</p>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="fas fa-book"></i>Bookings</div>
        <div class="nav-item"><i class="fas fa-download"></i>Receipt</div>
        <div class="nav-item"><i class="fas fa-user-graduate"></i>Profile</div>
    </nav>

    <script>
        const sheetURL = 'https://docs.google.com';
        let allData = [];

        async function load() {
            try {
                const res = await fetch(sheetURL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                allData = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                    return { name: c, info: c, price: c, status: c, cat: c };
                });
                switchTab('Rooms', 't1');
            } catch (e) { document.getElementById('main-content').innerHTML = "नेटवर्क एरर!"; }
        }

        function switchTab(cat, tabId) {
            const content = document.getElementById('main-content');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            if(cat === 'Gallery') {
                content.innerHTML = `<div class="gallery-grid">
                    <img class="gallery-img" src="https://images.unsplash.com">
                    <img class="gallery-img" src="https://images.unsplash.com">
                    <img class="gallery-img" src="https://images.unsplash.com">
                    <img class="gallery-img" src="https://images.unsplash.com">
                </div>`;
                return;
            }

            content.innerHTML = '';
            const filtered = allData.filter(i => i.cat === cat);
            filtered.forEach(i => {
                const isAvail = i.status.toLowerCase() === 'available';
                content.innerHTML += `<div class="card ${isAvail ? 'available-border' : 'booked-border'}">
                    <div class="status-badge ${isAvail ? 'available-bg' : 'booked-bg'}">${isAvail ? 'खाली है' : 'फुल है'}</div>
                    <h3 style="margin-top:10px;">${i.name}</h3>
                    <p>${i.info}</p>
                    <div style="color:var(--teal); font-weight:bold; font-size:18px;">₹${i.price}/Month</div>
                    <button style="width:100%; padding:10px; margin-top:10px; border:none; border-radius:8px; background:#eef2ff; color:var(--blue); font-weight:bold;" ${!isAvail ? 'disabled' : ''} onclick="window.open('https://wa.me: ${i.name}')">WhatsApp पर बुक करें</button>
                </div>`;
            });
        }
        load();
    </script>
</body>
</html>
