<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adarsh Lodge - Saharsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --blue: #1b263b; --teal: #00a896; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); padding-bottom: 80px; }

        /* नीला हेडर */
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { font-size: 18px; font-weight: bold; }

        /* ऊपर वाले टैब्स */
        .top-tabs { display: flex; background: white; overflow-x: auto; padding: 10px 5px; border-bottom: 1px solid #ddd; }
        .tab { padding: 8px 20px; color: #666; font-weight: bold; white-space: nowrap; font-size: 14px; cursor: pointer; }
        .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }

        /* बड़ा बैनर */
        .hero-banner { background: linear-gradient(135deg, #1b263b, #415a77); margin: 15px; border-radius: 15px; padding: 25px; color: white; position: relative; }
        .banner-tag { background: #ffbe0b; color: black; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }
        .hero-banner h2 { font-size: 22px; margin-bottom: 5px; }

        /* कार्ड्स वाला डिज़ाइन */
        .container { padding: 0 15px; }
        .card { background: white; border-radius: 12px; margin-bottom: 15px; padding: 15px; position: relative; border-left: 6px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card.available { border-left-color: #28a745; }
        .card.booked { border-left-color: #dc3545; opacity: 0.8; }
        
        .status-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 3px 10px; border-radius: 5px; color: white; font-weight: bold; text-transform: uppercase; }
        .available-bg { background: #28a745; }
        .booked-bg { background: #dc3545; }

        h3 { font-size: 17px; color: #111; margin-bottom: 5px; }
        p { font-size: 13px; color: #666; margin-bottom: 12px; }
        .price { font-size: 20px; font-weight: bold; color: var(--teal); }

        /* WhatsApp बटन */
        .book-btn { width: 100%; background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .book-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* नीचे वाली पट्टी (Bottom Nav) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--teal); }
    </style>
</head>
<body>

    <header>
        <div class="header-left"><i class="fas fa-bars"></i> &nbsp; आदर्श लॉज सहरसा</div>
        <div style="position: relative;"><i class="fas fa-bell"></i><span style="background:red; font-size:9px; padding:1px 4px; border-radius:50%; position:absolute; top:-5px; right:-5px;">9+</span></div>
    </header>

    <div class="top-tabs">
        <div class="tab active" id="btnRooms" onclick="showData('Rooms', 'btnRooms')">Rooms</div>
        <div class="tab" id="btnMess" onclick="showData('Mess', 'btnMess')">Mess</div>
        <div class="tab">Gallery</div>
    </div>

    <div class="hero-banner">
        <div class="banner-tag">STUDENT SPECIAL 2026</div>
        <h2>आदर्श लॉज (Adarsh Lodge)</h2>
        <p>सहरसा का नंबर 1 स्टूडेंट लॉज</p>
    </div>

    <div class="container" id="main-content">
        <p style="text-align:center; padding-top:50px; color:#999;">लोड हो रहा है...</p>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="fas fa-book"></i>My Batch</div>
        <div class="nav-item" onclick="window.location.href='tel:919876543210'"><i class="fas fa-phone-alt"></i>Help</div>
        <div class="nav-item"><i class="fas fa-user"></i>Profile</div>
    </nav>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/1FaGZFVuo_eN2NddQUzWVuAM1ujrc3OLivAvUT7-GrgA/edit?usp=drivesdk;
        let googleRows = [];

        async function fetchSheet() {
            try {
                const response = await fetch(sheetURL);
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                
                googleRows = rows.slice(1).map(c => {
                    return { 
                        name: (c[0] || '').replace(/"/g, '').trim(), 
                        info: (c[1] || '').replace(/"/g, '').trim(), 
                        price: (c[2] || '').replace(/"/g, '').trim(), 
                        status: (c[3] || '').replace(/"/g, '').trim().toLowerCase(), 
                        cat: (c[4] || '').replace(/"/g, '').trim() 
                    };
                });
                showData('Rooms', 'btnRooms');
            } catch (err) {
                document.getElementById('main-content').innerHTML = "डेटा लोड नहीं हो पाया!";
            }
        }

        function showData(category, btnId) {
            const content = document.getElementById('main-content');
            document.querySelectorAll('.tab').forEach(n => n.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
            
            content.innerHTML = `<h3 style="margin:15px 5px; font-size:16px;">${category === 'Rooms' ? 'उपलब्ध कमरे' : 'मेस मेनू'}</h3>`;
            
            const filtered = googleRows.filter(i => i.cat.toLowerCase() === category.toLowerCase());
            
            if(filtered.length === 0) {
                content.innerHTML += `<p style="text-align:center; padding:50px; color:#999;">कोई डेटा नहीं मिला।</p>`;
                return;
            }

            filtered.forEach(i => {
                const isAvail = i.status.includes('available');
                content.innerHTML += `
                    <div class="card ${isAvail ? 'available' : 'booked'}">
                        <div class="status-badge ${isAvail ? 'available-bg' : 'booked-bg'}">${isAvail ? 'खाली है' : 'फुल है'}</div>
                        <h3>${i.name}</h3>
                        <p>${i.info}</p>
                        <div class="price">₹${i.price}/महीना</div>
                        <button class="book-btn" ${!isAvail ? 'disabled' : ''} 
                                onclick="window.open('https://wa.me्ते, मुझे ${i.name} बुक करना है।')">
                            <i class="fab fa-whatsapp"></i> WhatsApp पर बुक करें
                        </button>
                    </div>`;
            });
        }
        fetchSheet();
    </script>
</body>
</html>
